_base_: ../base/common.yaml

experiment:
  seed: 125

benchmark:
  name: mixed_oracle_routing
  num_nodes: 4
  obs_dim: 24
  seq_len: 2

model:
  hidden_dim: 64
  max_internal_steps: 4
  adapter_rank: 4

method:
  name: hybrid_es
  temperature: 1.0

warmstart:
  enabled: true
  route_mode: soft
  train_steps: 8
  batch_size: 64
  val_every: 4

training:
  batch_size: 64
  val_batch_size: 128
  val_batches: 3
  test_batches: 4

es:
  generations: 8
  population: 8
  batch_size: 64
  eval_batch_size: 128
  sigma: 0.05
  rank: 2
  lr: 0.02
  val_every: 4
  val_batches: 3
  test_batches: 4
  evolve_adapters: false
