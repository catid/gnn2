  lambda_hops: 0.01
  lambda_delay: 0.005
  lambda_ttl: 0.5

training:
  batch_size: 128
  val_batch_size: 256
  train_steps: 120
  val_every: 20
  truncate_bptt_steps: 16
  val_batches: 6
  test_batches: 8

method:
  name: soft
  temperature: 1.0
