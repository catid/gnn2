_base_: ../base/common.yaml

experiment:
  seed: 205

benchmark:
  name: long_horizon_memory
  num_nodes: 4
  obs_dim: 24
  num_classes: 4
  seq_len: 64

model:
  hidden_dim: 96
  max_internal_steps: 4
  adapter_rank: 8

