_base_: ./hard_st_benchmark_b_v2_router2_forceoracle_release.yaml

experiment:
  seed: 992

routing:
  force_oracle_actions_until_step: 128
  oracle_route_weight_start: 0.6
  oracle_route_weight_end: 0.05
  oracle_route_weight_schedule_steps: 224
  anti_exit_weight_start: 0.2
  anti_exit_weight_end: 0.08
  anti_exit_weight_schedule_steps: 320

training:
  train_steps_delta: 320
  val_every: 20
  selection_metric: per_mode.delay_to_final_query.route_match
