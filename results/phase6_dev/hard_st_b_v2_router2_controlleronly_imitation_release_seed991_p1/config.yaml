_base_: ./hard_st_benchmark_b_v2_router2_forceoracle_release.yaml

experiment:
  seed: 987

training:
  train_steps_delta: 320
  val_every: 20
  trainable_prefixes:
    - core.router_
    - control_
    - wait_
    - release_
  controller_lr_scale: 1.0
  selection_metric: per_mode.delay_to_final_query.accuracy

routing:
  force_oracle_actions_until_step: 128
  oracle_route_weight_start: 0.5
  oracle_route_weight_end: 0.0
  oracle_route_weight_schedule_steps: 192
