_base_: ./hard_st_benchmark_b_v2_teacher1821_anchor_factorized_temporalbank_query_bilinear_noroute.yaml

experiment:
  seed: 16092
  results_root: results/phase13_dev

training:
  selection_eval_benchmarks:
    - name: full_locked
      config: ../../phase8/confirm/hard_st_benchmark_b_v2_confirm_full_locked.yaml
      split: confirm
      num_batches: 8
    - name: finalquery_heavy
      config: ../../phase8/confirm/hard_st_benchmark_b_v2_confirm_finalqueryheavy.yaml
      split: confirm
      num_batches: 8
    - name: longdistance
      config: ../../phase8/confirm/hard_st_benchmark_b_v2_confirm_longdistance.yaml
      split: confirm
      num_batches: 8
  selection_metric_mode: weighted_sum
  selection_metric_terms:
    - path: per_mode.delay_to_final_query.accuracy
      weight: 1.0
    - path: selection_eval.full_locked.per_mode.delay_to_final_query.accuracy
      weight: 2.0
    - path: selection_eval.full_locked.per_mode.delay_to_final_query.route_match
      weight: 2.0
    - path: selection_eval.full_locked.per_mode.delay_to_final_query.exit_time
      weight: 0.01
