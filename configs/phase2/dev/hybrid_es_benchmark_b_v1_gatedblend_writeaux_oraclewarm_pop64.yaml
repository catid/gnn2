_base_: ../base/benchmark_b_v1_common.yaml

experiment:
  seed: 415

model:
  packet_update: gated_gru
  delay_state_mode: adaptive_blend
  delay_gate_bias: 2.5

routing:
  force_oracle_actions: true
  oracle_route_weight: 0.5
  delay_write_weight: 0.25

method:
  name: hybrid_es

warmstart:
  enabled: true
  route_mode: soft
  train_steps: 180
  batch_size: 128
  val_every: 30
  routing:
    force_oracle_actions: true
    oracle_route_weight: 0.5
    delay_write_weight: 0.25
  objective_schedule:
    delay_penalty_start: 0.0
    delay_penalty_warmup_steps: 120

training:
  truncate_bptt_steps: 0

es:
  generations: 56
  population: 64
  sigma: 0.03
  rank: 4
  fitness_mode: centered_rank
