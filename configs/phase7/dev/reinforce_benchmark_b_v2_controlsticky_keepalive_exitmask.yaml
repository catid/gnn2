_base_: ./reinforce_benchmark_b_v2_controlsticky_keepalive_base.yaml

experiment:
  seed: 1404
  results_root: results/phase7_dev

method:
  entropy_weight: 0.04
  temperature_start: 1.8
  temperature_end: 1.0

routing:
  exit_mask_final_query_only: true
  exit_mask_final_query_only_until_step: 128
  anti_exit_weight_start: 0.20
  anti_exit_weight_end: 0.05
  anti_exit_weight_schedule_steps: 320

training:
  controller_lr_scale: 1.5
  selection_metric: per_mode.delay_to_final_query.route_match
